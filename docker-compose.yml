version: '3'
services:

  centrifugo:
    image: centrifugo/centrifugo:v6
    restart: always
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json
    command: centrifugo -c config.json
    ports:
      - 8100:8000
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
  backend:
    build: .
    command: uvicorn core.asgi:application --host 0.0.0.0 --port 8000 --lifespan off --reload
    # command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    volumes:
      - .:/app
      - ./staticfiles:/staticfiles
    ports:
      - "80:8000"
    depends_on:
      - redis
      - db
    networks:
      - default
      - db_network
    restart: always

  celery-worker:
    build: .
    command: celery -A core worker --loglevel=info -c 4
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - backend
      - redis
      - db
    networks:
      - default
      - db_network
    restart: always

  celery-beat:
    build: .
    command: celery -A core beat -l info -S django
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - backend
      - celery-worker
      - redis
      - db
    networks:
      - default
      - db_network
    restart: always

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: always

  onlogs:
    image: devforth/onlogs
    restart: always
    environment:
      - ADMIN_USERNAME=${ONLOGS_ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ONLOGS_ADMIN_PASSWORD}
      - PORT=8798
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers
      - onlogs-volume:/leveldb
    ports:
      - "8798:8798"

  db:
    image: postgres:17.0
    container_name: backend_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - db_network

volumes:
  onlogs-volume:
  pgdata:


networks:
  default:
  db_network:


